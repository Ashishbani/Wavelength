# Fly.io config for Wavelength.
# One machine + a persistent volume mounted at /data, so accounts, playlists and
# history survive restarts and redeploys. Change `app` to a globally-unique name
# (fly launch --name ... will set this for you), and `primary_region` if you like
# (bom = Mumbai; run `fly platform regions` to list all).
app = "wavelength-live"
primary_region = "bom"

[build]

[env]
  COOKIE_SECURE = "true"
  DB_PATH = "/data/wavelength.sqlite"

# The server listens on 3001 (its default); Fly's proxy routes public HTTPS to it.
[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Persistent disk. The volume must be named "wl_data" (see fly volumes create).
[mounts]
  source = "wl_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
